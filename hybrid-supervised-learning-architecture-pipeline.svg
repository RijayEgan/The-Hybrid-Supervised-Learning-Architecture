<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
      .label-top { font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.08em; }
      .step-num  { font-size: 11px; font-weight: 500; fill: #888780; }
      @media (prefers-color-scheme: dark) {
        .th { fill: #e8e6df; }
        .ts { fill: #9c9a92; }
        .label-top { fill: #5f5e5a; }
        .step-num  { fill: #5f5e5a; }
      }

      .b1 { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .b2 { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .b3 { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .b4 { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .b5 { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }

      .t1 { fill: #3C3489; } .s1 { fill: #534AB7; }
      .t2 { fill: #085041; } .s2 { fill: #0F6E56; }
      .t3 { fill: #633806; } .s3 { fill: #854F0B; }
      .t4 { fill: #0C447C; } .s4 { fill: #185FA5; }
      .t5 { fill: #712B13; } .s5 { fill: #993C1D; }

      @media (prefers-color-scheme: dark) {
        .b1 { fill: #3C3489; stroke: #AFA9EC; }
        .b2 { fill: #085041; stroke: #5DCAA5; }
        .b3 { fill: #633806; stroke: #EF9F27; }
        .b4 { fill: #0C447C; stroke: #85B7EB; }
        .b5 { fill: #712B13; stroke: #F0997B; }
        .t1 { fill: #CECBF6; } .s1 { fill: #AFA9EC; }
        .t2 { fill: #9FE1CB; } .s2 { fill: #5DCAA5; }
        .t3 { fill: #FAC775; } .s3 { fill: #EF9F27; }
        .t4 { fill: #B5D4F4; } .s4 { fill: #85B7EB; }
        .t5 { fill: #F5C4B3; } .s5 { fill: #F0997B; }
      }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) { .arr { stroke: #5f5e5a; } }
      .dashed { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text class="label-top" x="340" y="30" text-anchor="middle">HYBRID SUPERVISED LEARNING ARCHITECTURE — 5-STEP WORKFLOW</text>

  <!-- Step 1 -->
  <text class="step-num" x="150" y="54" text-anchor="middle">01</text>
  <rect class="b1" x="40" y="60" width="220" height="64" rx="8"/>
  <text class="th t1" x="150" y="85" text-anchor="middle" dominant-baseline="central">Handwriting data collection</text>
  <text class="ts s1" x="150" y="105" text-anchor="middle" dominant-baseline="central">Diverse writer samples ingested</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="92" x2="300" y2="92" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <text class="step-num" x="410" y="54" text-anchor="middle">02</text>
  <rect class="b2" x="300" y="60" width="240" height="64" rx="8"/>
  <text class="th t2" x="420" y="85" text-anchor="middle" dominant-baseline="central">Human-in-the-loop labelling</text>
  <text class="ts s2" x="420" y="105" text-anchor="middle" dominant-baseline="central">Expert annotators validate edge cases</text>

  <!-- Arrow 2→3 down -->
  <line x1="420" y1="124" x2="420" y2="184" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <text class="step-num" x="410" y="198" text-anchor="middle">03</text>
  <rect class="b3" x="300" y="204" width="240" height="64" rx="8"/>
  <text class="th t3" x="420" y="229" text-anchor="middle" dominant-baseline="central">Teacher model training</text>
  <text class="ts s3" x="420" y="249" text-anchor="middle" dominant-baseline="central">High-capacity model fits labelled set</text>

  <!-- Arrow 3→4 left -->
  <line x1="300" y1="236" x2="260" y2="236" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <text class="step-num" x="150" y="198" text-anchor="middle">04</text>
  <rect class="b4" x="40" y="204" width="220" height="64" rx="8"/>
  <text class="th t4" x="150" y="229" text-anchor="middle" dominant-baseline="central">Knowledge distillation</text>
  <text class="ts s4" x="150" y="249" text-anchor="middle" dominant-baseline="central">Student model learns soft targets</text>

  <!-- Arrow 4→5 down -->
  <line x1="150" y1="268" x2="150" y2="328" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <text class="step-num" x="150" y="342" text-anchor="middle">05</text>
  <rect class="b5" x="40" y="348" width="220" height="64" rx="8"/>
  <text class="th t5" x="150" y="373" text-anchor="middle" dominant-baseline="central">Recognition &amp; optimisation</text>
  <text class="ts s5" x="150" y="393" text-anchor="middle" dominant-baseline="central">Lightweight student deployed &amp; tuned</text>

  <!-- Feedback loop arrow from step 5 back to step 2 -->
  <path d="M 40 380 L 20 380 L 20 92 L 40 92" class="arr" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="14" y="240" text-anchor="middle" writing-mode="vertical-rl" transform="rotate(180,14,240)">HITL feedback loop</text>

  <!-- Legend box -->
  <rect x="40" y="448" width="600" height="68" rx="8" class="dashed"/>
  <text class="ts" x="340" y="470" text-anchor="middle">Output: compact student model optimised for handwriting recognition accuracy</text>
  <text class="ts" x="340" y="490" text-anchor="middle">Human-in-the-loop ensures label quality; distillation compresses without accuracy loss</text>
  <text class="ts" x="340" y="510" text-anchor="middle">Dashed loop = iterative re-annotation of model failure cases</text>
</svg>

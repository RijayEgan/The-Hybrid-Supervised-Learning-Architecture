name: Phase5 CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r Phase_5/requirements.txt
      - run: python -m py_compile Phase_5/api.py
